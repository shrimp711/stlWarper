<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STLwarp Web Compensation</title>
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>STLwarp 一键补偿工具</h1>
      <p class="subtitle">上传 STL -> 选择材料 -> 自动变形补偿 -> 下载新 STL</p>
    </div>
    <span class="chip">纯前端本地运行</span>
  </header>

  <main class="layout">
    <section class="panel controls">
      <h2>参数</h2>

      <label class="field">
        <span>1. 上传 STL</span>
        <input id="stlInput" type="file" accept=".stl" />
      </label>

      <label class="field">
        <span>2. 选择材料</span>
        <select id="materialSelect"></select>
      </label>

      <label class="field">
        <span>工艺预设</span>
        <select id="presetSelect"></select>
      </label>

      <div class="preset-card" id="presetCard">
        <p><strong>喷嘴温度:</strong> <span id="nozzleValue">-</span> C</p>
        <p><strong>热床温度:</strong> <span id="bedValue">-</span> C</p>
        <p><strong>腔体温度:</strong> <span id="chamberValue">-</span> C</p>
        <p><strong>固有形变:</strong> <span id="strainValue">-</span></p>
      </div>

      <button id="runButton" class="primary" disabled>3. 一键补偿并下载</button>
      <p class="hint">提示: 首次打开请使用本地静态服务启动，避免浏览器拦截 JSON 读取。</p>
      <p id="status" class="status">等待加载 database.json ...</p>
    </section>

    <section class="panel viewer-wrap">
      <h2>模型预览</h2>
      <div id="viewer" class="viewer"></div>
      <div class="legend">
        <span><i class="dot before"></i>原始模型</span>
        <span><i class="dot after"></i>补偿后模型</span>
      </div>
    </section>
  </main>

  <footer class="footer">
    数据源: material-db/database.json · 所有计算均在本地浏览器执行。
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
